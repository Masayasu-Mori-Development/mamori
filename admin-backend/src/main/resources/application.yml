spring:
  application:
    name: mamori-admin-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mamori
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: admin
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: admin
    locations: classpath:db/migration

server:
  port: 8082
  servlet:
    context-path: /api/admin

# JWT設定
jwt:
  secret: ${JWT_SECRET_ADMIN:change-this-in-production-admin-secret-key-256-bit}
  expiration: 1800000  # 30分（運営ユーザーは短め）

# MFA設定
mfa:
  issuer: Mamori Admin
  enabled: true

# CORS設定
cors:
  allowed-origins:
    - http://localhost:3001
    - https://admin.mamori.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed-headers:
    - Authorization
    - Content-Type
  allow-credentials: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
